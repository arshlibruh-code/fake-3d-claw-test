<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake 3D Image</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #canvas-container { width: 100vw; height: 100vh; }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
    }

    #drop-zone {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7);
      padding: 10px 14px;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #drop-zone:hover { background: rgba(255,255,255,0.12); }
    #drop-zone.drag-over { background: rgba(255,255,255,0.2); border-color: #fff; }
    #file-input { display: none; }

    #slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #slider-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #disp-slider {
      -webkit-appearance: none;
      width: 180px;
      height: 2px;
      background: rgba(255,255,255,0.2);
      outline: none;
      cursor: pointer;
    }
    #disp-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #fff;
      cursor: pointer;
    }
    #disp-val {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    Drop image or click to load
  </div>
  <input type="file" id="file-input" accept="image/*" />

  <div id="slider-wrap">
    <div id="slider-label">Displacement <span id="disp-val">2.0</span></div>
    <input type="range" id="disp-slider" min="0" max="5" step="0.01" value="2.0" />
  </div>
</div>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  // Camera
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 4, 8);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // Controls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.target.set(0, 0, 0);

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(5, 10, 7);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // Geometry + Material
  const geo = new THREE.PlaneGeometry(10, 10, 256, 256);
  geo.rotateX(-Math.PI / 2);

  const mat = new THREE.MeshStandardMaterial({
    displacementScale: 2.0,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Load default texture (bundled image)
  const loader = new THREE.TextureLoader();
  loader.load('./texture.jpg', (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    mat.map = tex;
    mat.displacementMap = tex;
    mat.needsUpdate = true;
  });

  // File input handler
  function applyImageFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const url = URL.createObjectURL(file);
    loader.load(url, (tex) => {
      tex.colorSpace = THREE.SRGBColorSpace;
      if (mat.map) mat.map.dispose();
      if (mat.displacementMap && mat.displacementMap !== mat.map) mat.displacementMap.dispose();
      mat.map = tex;
      mat.displacementMap = tex;
      mat.needsUpdate = true;
    });
  }

  document.getElementById('file-input').addEventListener('change', (e) => {
    applyImageFile(e.target.files[0]);
  });

  // Drag and drop
  const dropZone = document.getElementById('drop-zone');
  document.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  document.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    applyImageFile(e.dataTransfer.files[0]);
  });

  // Displacement slider
  const slider = document.getElementById('disp-slider');
  const dispVal = document.getElementById('disp-val');
  slider.addEventListener('input', () => {
    mat.displacementScale = parseFloat(slider.value);
    dispVal.textContent = parseFloat(slider.value).toFixed(2);
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
